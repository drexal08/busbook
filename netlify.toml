[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Local development settings
[dev]
  command = "npm run dev"
  port = 5173
  targetPort = 5173
  framework = "#custom"
  functionsPort = 8888